name: Release desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundle_args: nsis
            artifact_name: SchoolSoft-Calendar-Helper-Windows-Setup
            output_name: SchoolSoft-Calendar-Helper-Setup.exe
            glob: src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS
            os: macos-latest
            bundle_args: dmg
            artifact_name: SchoolSoft-Calendar-Helper-macOS-DMG
            output_name: SchoolSoft-Calendar-Helper-macOS.dmg
            glob: src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux AppImage
            os: ubuntu-22.04
            bundle_args: appimage
            artifact_name: SchoolSoft-Calendar-Helper-Linux-AppImage
            output_name: SchoolSoft-Calendar-Helper-Linux.AppImage
            glob: src-tauri/target/release/bundle/appimage/*.AppImage
          - name: Linux Debian
            os: ubuntu-22.04
            bundle_args: deb
            artifact_name: SchoolSoft-Calendar-Helper-Linux-Debian
            output_name: SchoolSoft-Calendar-Helper-Linux.deb
            glob: src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Check project
        run: npm run check

      - name: Build desktop bundle
        run: npx tauri build --bundles ${{ matrix.bundle_args }}

      - name: Prepare release asset
        shell: pwsh
        run: |
          $matches = Get-ChildItem -Path "${{ matrix.glob }}" -File -ErrorAction SilentlyContinue
          $bundle = $matches | Select-Object -First 1
          if (-not $bundle) { throw "No bundle produced for ${{ matrix.name }} using glob ${{ matrix.glob }}" }
          New-Item -ItemType Directory -Force -Path "dist-release" | Out-Null
          Copy-Item $bundle.FullName "dist-release/${{ matrix.output_name }}" -Force
          Get-ChildItem "dist-release"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-release/${{ matrix.output_name }}
          if-no-files-found: error

      - name: Upload asset to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/${{ matrix.output_name }}
          generate_release_notes: true
          append_body: true
          body: |
            ## SchoolSoft Calendar Helper

            Unofficial, local-first desktop app.

            ### Downloads
            - Windows: `SchoolSoft-Calendar-Helper-Setup.exe`
            - macOS: `SchoolSoft-Calendar-Helper-macOS.dmg`
            - Linux AppImage: `SchoolSoft-Calendar-Helper-Linux.AppImage`
            - Linux Debian package: `SchoolSoft-Calendar-Helper-Linux.deb`

            ### Important
            - This is not an official SchoolSoft product.
            - SchoolSoft data stays on your computer when using this app as distributed here.
            - Builds are currently unsigned, so Windows/macOS may show security warnings.
            - This is still an early release; test carefully before broad use.
